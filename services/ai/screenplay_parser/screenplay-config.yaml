# FilmForge - AI Service Configuration
# Shared config for the Screenplay Parser & LLM Integration Service

service:
  name: screenplay-parser
  version: 1.0.0
  host: 0.0.0.0
  port: 8100

llm:
  # Default provider (openai, anthropic, or mock)
  default_provider: mock
  
  # OpenAI configuration
  openai:
    model: gpt-4o-mini
    temperature: 0.3
    max_tokens: 4096
  
  # Anthropic configuration
  anthropic:
    model: claude-3-haiku-20240307
    temperature: 0.3
    max_tokens: 4096

parsing:
  # Regex patterns for scene detection (supports standard screenplay formats)
  scene_header_patterns:
    - "^(INT|EXT|INT/EXT|I/E)[.\\s]+.*$"
    - "^[\\d]+\\.\\s+(INT|EXT|INT/EXT|I/E)[.\\s]+.*$"
  
  # Fountain-specific patterns
  fountain:
    scene_heading_prefix: "."
    transition_prefix: ">"
    character_suffix: "^"
  
  # Dialogue detection
  dialogue_character_pattern: "^[A-Z][A-Z\\s\\-\\.']+$"
  parenthetical_pattern: "^\\(.*\\)$"